<script>
'use strict';

/* ─────────────────────────────  i18n  ───────────────────────────── */
const I18N = {

        appTitle: 'めの たんけん',

        introBody: 'スマホを みたら、<strong>めが つかれた</strong>こと、ある？<br>ふくろうの もりに あそびに きて、<br>めを <strong>3ぷん</strong> やすませてみよう。<br><strong>4〜9さい</strong>の こども と おうちの ひと へ。',

        tagRule: '20-20-20',
        tagAnti: 'めを やすめる',

        btnAgain: 'もういちど',

        s3jp: 'ぱっぱの ほし',         s3en: 'Star Flash',

        s6jp: 'よあけ',                 s6en: 'Dawn',
        i1: 'ふくろうと いっしょに、ゆっくり <strong>まばたき</strong>',

        i4_near: 'ちょうちょ が おおきく → スマホを <strong>ちかく</strong>に',
        i4_far:  'ちょうちょ が ちいさく → スマホを <strong>とおく</strong>に',
        i5_pre:  'スマホから めを はなす じかん！',
        i5_main: 'まどか かべを <strong>20びょう</strong> みよう',
        i5_tilt: 'スマホを よこに、または したに むけてね',
        i5_done: 'もどってきた！',

            '<strong>20-20-20 ルール</strong><br>20ぷん がめんを みたら、<br>20びょう とおく（6m）を みよう。',
            '<strong>まばたき を わすれずに</strong><br>がめんを みると まばたきが <br>はんぶんに へってしまうよ。',
            'がめんは、<strong>こぶし2つぶん</strong> いじょう めから はなして もとう。',
            'そとで <strong>1日 2じかん</strong> あそぶと、めの ピントが よくなるって。',
            'くらい へやで がめんを みると めが つかれやすいよ。<strong>あかるく</strong> してね。'

    },
    en: {
        appTitle: 'Eye Expedition',
        appTitleEn: 'めの たんけん',
        introBody: 'Phone making your <strong>eyes tired</strong>?<br>Visit the owl\'s forest and<br>let your eyes rest for <strong>3 minutes</strong>.<br>For kids <strong>ages 4–9</strong> and a grown-up.',
        tagAge: 'Ages 4–9',
        tagRule: '20-20-20',
        tagAnti: 'Eye-friendly',
        btnStart: 'Start',
        btnAgain: 'Again',
        btnShare: 'Share',
        endTitle: 'Well done!',
        endTitleEn: 'おつかれさま！',
        s1jp: 'Owl\'s Greeting',  s1en: 'ふくろう の あいさつ',
        s2jp: 'Firefly Chase',    s2en: 'ホタル おっかけ',
        s3jp: 'Star Flash',       s3en: 'ぱっぱの ほし',
        s4jp: 'Near and Far',     s4en: 'ちかい・とおい',
        s5jp: '20-Second Rest',   s5en: '20びょう やすみ',
        s6jp: 'Dawn',             s6en: 'よあけ',
        i1: 'Blink slowly with the <strong>owl</strong>',
        i2: 'Follow the <strong>firefly</strong> with your eyes',
        i3: 'Tap the <strong>star</strong> when it lights!',
        i4_near: 'Butterfly grows → bring phone <strong>closer</strong>',
        i4_far:  'Butterfly shrinks → hold phone <strong>far</strong> away',
        i5_pre:  'Time to look away!',
        i5_main: 'Look at a window or wall for <strong>20s</strong>',

        i6: 'Dawn has come. Lovely work.',
        endTips: [
            '<strong>The 20-20-20 rule:</strong><br>Every 20 min on screen,<br>look 20 ft (6 m) away for 20 s.',
            '<strong>Don\'t forget to blink.</strong><br>Looking at a screen cuts<br>your blink rate in half.',
            'Hold the screen at least <strong>two fists</strong> away from your face.',

        ],

};

let lang = (navigator.language || 'ja').toLowerCase().startsWith('ja') ? 'ja' : 'en';

function t(k){ return (I18N[lang] && I18N[lang][k]) || (I18N.ja && I18N.ja[k]) || k; }
function applyI18n(){
    document.documentElement.lang = lang;
    document.querySelectorAll('[data-i18n]').forEach(el => {
        const k = el.getAttribute('data-i18n');
        const v = t(k);
        if (v != null) el.innerHTML = v;
    });
}
document.querySelectorAll('.lang-btn').forEach(b => {
    b.addEventListener('click', () => {
        lang = b.getAttribute('data-lang');
        document.querySelectorAll('.lang-btn').forEach(x => x.classList.toggle('active', x === b));
        applyI18n();
    });
});

/* ─────────────────────────────  Canvas  ───────────────────────────── */
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
let W = 0, H = 0, DPR = Math.max(1, window.devicePixelRatio || 1);
function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    cv.width = W * DPR;
    cv.height = H * DPR;
    cv.style.width = W + 'px';
    cv.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
resize();
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 200));

/* Background stars (always present, brightness modulated by stage) */
const STARS = [];
for (let i = 0; i < 60; i++) {
    STARS.push({ x: Math.random(), y: Math.random() * 0.8, r: 0.5 + Math.random() * 1.6, ph: Math.random() * Math.PI * 2 });
}
let bgBrightness = 1.0; // 1 = full night (bright stars), 0 = dawn

function drawStars(now) {
    for (const s of STARS) {
        const tw = 0.6 + 0.4 * Math.sin(now / 600 + s.ph);
        ctx.globalAlpha = Math.max(0, bgBrightness * tw);
        ctx.fillStyle = '#f5e9c8';
        ctx.beginPath();
        ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.globalAlpha = 1;
}

/* ─────────────────────────────  Audio  ───────────────────────────── */
let actx = null;
function audio() {
    if (!actx) {
        try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch(_) {}
    }
    return actx;
}
function tone(freq, dur, type='sine', gain=0.06) {
    const a = audio(); if (!a) return;
    if (a.state === 'suspended') a.resume();
    const o = a.createOscillator(); const g = a.createGain();
    o.type = type; o.frequency.value = freq;
    o.connect(g); g.connect(a.destination);
    const t0 = a.currentTime;
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(gain, t0 + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
    o.start(t0); o.stop(t0 + dur + 0.05);
}
function chime() { tone(880, 0.18, 'sine', 0.05); setTimeout(()=>tone(1320, 0.22, 'sine', 0.04), 90); }
function softHoot() {
    const a = audio(); if (!a) return;
    if (a.state === 'suspended') a.resume();
    const o = a.createOscillator(), g = a.createGain();
    o.type = 'sine'; o.frequency.value = 440;
    o.connect(g); g.connect(a.destination);
    const t0 = a.currentTime;
    o.frequency.setValueAtTime(380, t0);
    o.frequency.linearRampToValueAtTime(330, t0 + 0.4);
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(0.05, t0 + 0.05);
    g.gain.exponentialRampToValueAtTime(0.001, t0 + 0.6);
    o.start(t0); o.stop(t0 + 0.7);
}
function tick() { tone(660, 0.05, 'square', 0.02); }
function chord() {
    [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => tone(f, 0.4, 'sine', 0.04), i * 70));
}

/* ─────────────────────────────  Stage Engine  ───────────────────────────── */
const stages = [
    { jp: 's1jp', en: 's1en', dur: 16, fn: stageOwl,      instr: 'i1' },
    { jp: 's2jp', en: 's2en', dur: 22, fn: stageFirefly,  instr: 'i2' },
    { jp: 's3jp', en: 's3en', dur: 22, fn: stageStars,    instr: 'i3' },
    { jp: 's4jp', en: 's4en', dur: 24, fn: stageNearFar,  instr: 'i4_near' },
    { jp: 's5jp', en: 's5en', dur: 24, fn: stageRest,     instr: 'i5_main' },
    { jp: 's6jp', en: 's6en', dur: 7,  fn: stageDawn,     instr: 'i6' }
];
let stageIdx = -1;
let stageStart = 0;
let stageRunning = false;
let stageData = {};
let rafId = 0;

const $stageName = document.getElementById('stage-name');
const $stageNameJp = document.getElementById('stage-name-jp');
const $stageNameEn = document.getElementById('stage-name-en');
const $instr = document.getElementById('instr');
const $instrText = document.getElementById('instr-text');
const $countdown = document.getElementById('countdown');
const $flash = document.getElementById('flash');
const $sky = document.getElementById('sky');
const $sceneIntro = document.getElementById('scene-intro');
const $sceneEnd = document.getElementById('scene-end');

function setSky(stage) {
    // Progressively brighten the sky from deep night → dawn
    const map = [
        'radial-gradient(ellipse at 50% 110%, #1a2e4a 0%, #0a1428 40%, #050a18 100%)',
        'radial-gradient(ellipse at 50% 110%, #213b5a 0%, #0e1b30 40%, #060c1c 100%)',
        'radial-gradient(ellipse at 50% 110%, #2a4868 0%, #142540 40%, #081024 100%)',
        'radial-gradient(ellipse at 50% 110%, #3a577a 0%, #1a2d4a 40%, #0a1428 100%)',
        'radial-gradient(ellipse at 50% 100%, #6b5a44 0%, #2a3a55 40%, #101a30 100%)',
        'radial-gradient(ellipse at 50% 90%, #f0c050 0%, #d97a4a 25%, #4a4368 60%, #1a2040 100%)'
    ];
    $sky.style.background = map[Math.min(stage, map.length - 1)];
    bgBrightness = Math.max(0, 1 - stage * 0.16);
}

function showInstr(key) {
    $instrText.innerHTML = t(key);
    $instr.classList.remove('hidden');
}
function hideInstr() { $instr.classList.add('hidden'); }
function showStageName(s) {
    $stageNameJp.textContent = lang === 'ja' ? t(s.jp) : t(s.jp);
    $stageNameEn.textContent = lang === 'ja' ? t(s.en) : t(s.en);
    $stageName.classList.remove('hidden');
}
function hideStageName() { $stageName.classList.add('hidden'); }

function updateProgress() {
    document.querySelectorAll('.dot').forEach((d, i) => {
        d.classList.remove('done', 'now');
        if (i < stageIdx) d.classList.add('done');
        else if (i === stageIdx) d.classList.add('now');
    });
}

function flash() {
    $flash.style.opacity = '1';
    setTimeout(() => { $flash.style.opacity = '0'; }, 350);
}

let lastFrameTs = 0;
function gameLoop(ts) {
    if (!stageRunning) return;
    const dt = (lastFrameTs ? (ts - lastFrameTs) : 16) / 1000;
    lastFrameTs = ts;
    const elapsed = (ts - stageStart) / 1000;
    ctx.clearRect(0, 0, W, H);
    drawStars(ts);
    const s = stages[stageIdx];
    if (s) s.fn(ts, dt, elapsed);
    if (s && elapsed >= s.dur) {
        nextStage();
        return;
    }
    rafId = requestAnimationFrame(gameLoop);
}

function nextStage() {
    cancelAnimationFrame(rafId);
    stageRunning = false;
    if (stageData.cleanup) { stageData.cleanup(); stageData.cleanup = null; }
    // Always hide the countdown when leaving a stage — it's only used by stage 5
    $countdown.classList.add('hidden');
    stageIdx++;
    if (stageIdx >= stages.length) { endGame(); return; }
    const s = stages[stageIdx];
    stageData = {};
    setSky(stageIdx);
    updateProgress();
    showStageName(s);
    showInstr(s.instr);
    setTimeout(() => hideStageName(), 1800);
    if (s.fn === stageDawn) {} // dawn flash handled inside stageDawn
    chime();
    stageStart = performance.now();
    lastFrameTs = 0;
    stageRunning = true;
    rafId = requestAnimationFrame(gameLoop);
}

function startGame() {
    audio(); // unlock on user gesture
    $sceneIntro.classList.add('hidden');
    $sceneEnd.classList.add('hidden');
    stageIdx = -1;
    setSky(0);
    nextStage();
}

function endGame() {
    cancelAnimationFrame(rafId);
    stageRunning = false;
    if (stageData.cleanup) { stageData.cleanup(); stageData.cleanup = null; }
    hideInstr();
    hideStageName();
    $countdown.classList.add('hidden');
    // Clear canvas so the dawn sun doesn't overlap end-screen text
    ctx.clearRect(0, 0, W, H);
    setSky(5);
    chord();
    // Pick a random tip
    const tips = I18N[lang].endTips;
    document.getElementById('end-tip').innerHTML = tips[Math.floor(Math.random() * tips.length)];
    $sceneEnd.classList.remove('hidden');
    updateProgress();
}

document.getElementById('btn-start').addEventListener('click', startGame);
document.getElementById('btn-again').addEventListener('click', startGame);
document.getElementById('btn-share').addEventListener('click', async () => {
    const url = location.href;
    const text = lang === 'ja'
        ? 'めの たんけん — こども(4〜9さい)向け、めを やすめる 3分の あそび'
        : 'Eye Expedition — a 3-min eye-rest game for kids ages 4–9';
    if (navigator.share) {
        try { await navigator.share({ title: t('appTitle'), text, url }); } catch(_) {}
    } else {
        try { await navigator.clipboard.writeText(url); alert(lang === 'ja' ? 'リンクを コピーしました' : 'Link copied'); } catch(_) {}
    }
});

/* ──────────────────────  STAGE 1: Owl's Greeting  ────────────────────── */
function stageOwl(ts, dt, elapsed) {
    const cx = W / 2, cy = H / 2;
    const cycle = (elapsed % 4) / 4; // 4-second blink cycle
    // Eye openness: open most of the time, closes briefly at the end of cycle
    let open = 1;
    if (cycle > 0.7 && cycle < 0.85) {
        const k = (cycle - 0.7) / 0.15;
        open = 1 - Math.sin(k * Math.PI);
    }
    if (cycle > 0.71 && cycle < 0.73 && !stageData.hooted) {
        softHoot(); stageData.hooted = true;
    } else if (cycle < 0.5) stageData.hooted = false;

    // Owl body silhouette
    const bodyR = Math.min(W, H) * 0.22;
    ctx.save();
    ctx.translate(cx, cy + bodyR * 0.15);
    // body
    ctx.fillStyle = '#3b2a1c';
    ctx.beginPath();
    ctx.ellipse(0, bodyR * 0.55, bodyR * 0.95, bodyR * 1.05, 0, 0, Math.PI * 2);
    ctx.fill();
    // head
    ctx.beginPath();
    ctx.ellipse(0, -bodyR * 0.1, bodyR * 0.95, bodyR * 0.85, 0, 0, Math.PI * 2);
    ctx.fill();
    // ear tufts
    ctx.beginPath();
    ctx.moveTo(-bodyR * 0.7, -bodyR * 0.65);
    ctx.lineTo(-bodyR * 0.5, -bodyR * 0.95);
    ctx.lineTo(-bodyR * 0.3, -bodyR * 0.65);
    ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(bodyR * 0.7, -bodyR * 0.65);
    ctx.lineTo(bodyR * 0.5, -bodyR * 0.95);
    ctx.lineTo(bodyR * 0.3, -bodyR * 0.65);
    ctx.closePath(); ctx.fill();
    // belly
    ctx.fillStyle = '#5a4530';
    ctx.beginPath();
    ctx.ellipse(0, bodyR * 0.55, bodyR * 0.55, bodyR * 0.75, 0, 0, Math.PI * 2);
    ctx.fill();
    // beak
    ctx.fillStyle = '#d99a2a';
    ctx.beginPath();
    ctx.moveTo(0, bodyR * 0.05);
    ctx.lineTo(-bodyR * 0.1, bodyR * 0.18);
    ctx.lineTo(bodyR * 0.1, bodyR * 0.18);
    ctx.closePath(); ctx.fill();

    // eyes
    const eyeY = -bodyR * 0.25;
    const eyeX = bodyR * 0.32;
    for (const sx of [-1, 1]) {
        // eye disc
        ctx.fillStyle = '#f5e9c8';
        ctx.beginPath();
        ctx.arc(sx * eyeX, eyeY, bodyR * 0.26, 0, Math.PI * 2);
        ctx.fill();
        // pupil (clipped vertically by 'open')
        ctx.save();
        ctx.beginPath();
        ctx.rect(sx * eyeX - bodyR * 0.3, eyeY - bodyR * 0.26 * open, bodyR * 0.6, bodyR * 0.52 * open);
        ctx.clip();
        ctx.fillStyle = '#1a1408';
        ctx.beginPath();
        ctx.arc(sx * eyeX, eyeY, bodyR * 0.16, 0, Math.PI * 2);
        ctx.fill();
        // glint
        ctx.fillStyle = '#f0c050';
        ctx.beginPath();
        ctx.arc(sx * eyeX + bodyR * 0.05, eyeY - bodyR * 0.05, bodyR * 0.04, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
        // upper lid (closing)
        if (open < 1) {
            ctx.fillStyle = '#3b2a1c';
            ctx.beginPath();
            ctx.arc(sx * eyeX, eyeY, bodyR * 0.27, Math.PI, Math.PI + Math.PI * (1 - open));
            ctx.lineTo(sx * eyeX - bodyR * 0.27, eyeY);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(sx * eyeX, eyeY, bodyR * 0.27, -Math.PI * (1 - open), 0);
            ctx.lineTo(sx * eyeX, eyeY);
            ctx.fill();
            // simpler: cover top portion proportionally
            ctx.fillStyle = '#3b2a1c';
            ctx.fillRect(sx * eyeX - bodyR * 0.28, eyeY - bodyR * 0.27, bodyR * 0.56, bodyR * 0.27 * (1 - open));
            ctx.fillRect(sx * eyeX - bodyR * 0.28, eyeY + bodyR * 0.27 * open, bodyR * 0.56, bodyR * 0.27 * (1 - open));
        }
    }
    ctx.restore();
}

/* ──────────────────────  STAGE 2: Firefly Chase  ────────────────────── */
function stageFirefly(ts, dt, elapsed) {
    if (!stageData.trail) stageData.trail = [];
    const trail = stageData.trail;
    // Lissajous path
    const ax = W * 0.36, ay = H * 0.28;
    const cx = W * 0.5, cy = H * 0.5;
    const phase = elapsed * 0.55;
    const x = cx + ax * Math.sin(phase * 2.0);
    const y = cy + ay * Math.sin(phase * 3.0 + Math.PI / 4);
    trail.push({ x, y, t: ts });
    while (trail.length > 60) trail.shift();
    // sparkle trail
    for (let i = 0; i < trail.length; i++) {
        const p = trail[i];
        const a = i / trail.length;
        ctx.globalAlpha = a * 0.5;
        ctx.fillStyle = '#f0e070';
        ctx.beginPath();
        ctx.arc(p.x, p.y, 1.5 + a * 1.5, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.globalAlpha = 1;
    // firefly glow
    const glow = ctx.createRadialGradient(x, y, 0, x, y, 38);
    glow.addColorStop(0, 'rgba(255, 240, 140, 0.95)');
    glow.addColorStop(0.4, 'rgba(255, 240, 140, 0.45)');
    glow.addColorStop(1, 'rgba(255, 240, 140, 0)');
    ctx.fillStyle = glow;
    ctx.fillRect(x - 38, y - 38, 76, 76);
    // body
    ctx.fillStyle = '#fff8c8';
    ctx.beginPath();
    ctx.arc(x, y, 6, 0, Math.PI * 2);
    ctx.fill();
    // wings flutter
    const flutter = Math.sin(ts / 60) * 4;
    ctx.fillStyle = 'rgba(255, 255, 220, 0.35)';
    ctx.beginPath();
    ctx.ellipse(x - 6, y - flutter, 5, 3, -0.4, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(x + 6, y - flutter, 5, 3, 0.4, 0, Math.PI * 2);
    ctx.fill();
}

/* ──────────────────────  STAGE 3: Star Flash (saccades)  ────────────────────── */
function stageStars(ts, dt, elapsed) {
    if (!stageData.stars) {
        const positions = [];
        const margin = 80;
        // Generate well-spaced positions
        const cells = [
            [0.18, 0.30], [0.50, 0.20], [0.82, 0.32],
            [0.20, 0.55], [0.50, 0.50], [0.80, 0.58],
            [0.30, 0.78], [0.70, 0.75]
        ];
        for (const c of cells) positions.push({ x: c[0] * W, y: margin + c[1] * (H - margin * 2) });
        stageData.stars = positions;
        stageData.activeIdx = -1;
        stageData.activeUntil = 0;
        stageData.popping = []; // pop animations
        stageData.score = 0;
        stageData.next = 0;
    }
    // Periodically light a new star
    if (ts > stageData.next) {
        stageData.activeIdx = Math.floor(Math.random() * stageData.stars.length);
        stageData.activeUntil = ts + 1800;
        stageData.next = ts + 1300 + Math.random() * 400;
    }
    if (ts > stageData.activeUntil) stageData.activeIdx = -1;
    // Draw all stars
    stageData.stars.forEach((p, i) => {
        const lit = (i === stageData.activeIdx);
        if (lit) {
            const r = 22 + Math.sin(ts / 80) * 4;
            const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, r * 2.5);
            grad.addColorStop(0, 'rgba(255,230,150,1)');
            grad.addColorStop(0.4, 'rgba(255,200,90,0.55)');
            grad.addColorStop(1, 'rgba(255,200,90,0)');
            ctx.fillStyle = grad;
            ctx.fillRect(p.x - r * 2.5, p.y - r * 2.5, r * 5, r * 5);
            drawStarShape(p.x, p.y, r, '#fff5b0');
        } else {
            drawStarShape(p.x, p.y, 8, 'rgba(245,233,200,0.35)');
        }
    });
    // Pop animations
    stageData.popping = stageData.popping.filter(pop => {
        const age = (ts - pop.t) / 600;
        if (age > 1) return false;
        const r = 22 + age * 50;
        ctx.globalAlpha = 1 - age;
        ctx.strokeStyle = '#ffe690';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(pop.x, pop.y, r, 0, Math.PI * 2);
        ctx.stroke();
        ctx.globalAlpha = 1;
        return true;
    });
    // Score display
    ctx.fillStyle = 'rgba(245,233,200,0.7)';
    ctx.font = 'bold 14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('★ ' + stageData.score, W / 2, 110);
    // Init click handler once
    if (!stageData._listener) {
        stageData._listener = (e) => {
            const r = cv.getBoundingClientRect();
            const px = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
            const py = (e.touches ? e.touches[0].clientY : e.clientY) - r.top;
            if (stageData.activeIdx >= 0) {
                const p = stageData.stars[stageData.activeIdx];
                if ((px - p.x) ** 2 + (py - p.y) ** 2 < 60 * 60) {
                    stageData.popping.push({ x: p.x, y: p.y, t: performance.now() });
                    stageData.score++;
                    stageData.activeIdx = -1;
                    stageData.next = performance.now() + 350;
                    tone(880 + Math.random() * 200, 0.12, 'triangle', 0.04);
                }
            }
        };
        cv.addEventListener('pointerdown', stageData._listener);
        stageData.cleanup = () => cv.removeEventListener('pointerdown', stageData._listener);
    }
}
function drawStarShape(cx, cy, r, color) {
    ctx.fillStyle = color;
    ctx.beginPath();
    for (let i = 0; i < 10; i++) {
        const a = (Math.PI / 5) * i - Math.PI / 2;
        const rr = i % 2 === 0 ? r : r * 0.42;
        const x = cx + Math.cos(a) * rr;
        const y = cy + Math.sin(a) * rr;
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.fill();
}

/* ──────────────────────  STAGE 4: Near / Far  ────────────────────── */
function stageNearFar(ts, dt, elapsed) {
    // 8-second cycles: shrink (far) → grow (near)
    const cycle = (elapsed % 8) / 8;
    const half = cycle < 0.5;
    // size oscillates, with hold periods
    let scale;
    if (half) {
        // 0.0–0.5: tiny → big
        scale = 0.12 + 0.88 * Math.pow(cycle * 2, 1.2);
    } else {
        scale = 0.12 + 0.88 * Math.pow((1 - cycle) * 2, 1.2);
    }
    const desiredKey = (scale > 0.55) ? 'i4_near' : 'i4_far';
    if (stageData.lastKey !== desiredKey) {
        stageData.lastKey = desiredKey;
        showInstr(desiredKey);
    }
    const cx = W / 2, cy = H / 2;
    const baseR = Math.min(W, H) * 0.30;     // bigger base size — butterfly spans nicely
    const r = baseR * scale;
    const flap = 0.55 + 0.45 * Math.abs(Math.sin(ts / 140)); // flap from narrow→full
    ctx.save();
    ctx.translate(cx, cy);
    // Wings: 4 large blades arranged like a butterfly silhouette
    for (const sx of [-1, 1]) {
        // Upper wing — large rounded triangle / petal
        ctx.fillStyle = '#f0c050';
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.bezierCurveTo(
            sx * r * 0.2, -r * 0.95,
            sx * r * 1.15 * flap, -r * 0.85,
            sx * r * 1.0 * flap, -r * 0.15
        );
        ctx.bezierCurveTo(
            sx * r * 0.85 * flap, r * 0.0,
            sx * r * 0.4, -r * 0.05,
            0, 0
        );
        ctx.fill();
        // Lower wing — smaller petal
        ctx.fillStyle = '#d97a4a';
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.bezierCurveTo(
            sx * r * 0.15, r * 0.2,
            sx * r * 0.95 * flap, r * 0.4,
            sx * r * 0.78 * flap, r * 0.85
        );
        ctx.bezierCurveTo(
            sx * r * 0.55 * flap, r * 0.95,
            sx * r * 0.15, r * 0.4,
            0, 0
        );
        ctx.fill();
        // Wing-eye spots (decorative)
        ctx.fillStyle = '#fff5c8';
        ctx.beginPath();
        ctx.arc(sx * r * 0.65 * flap, -r * 0.45, r * 0.10, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#3b2a1c';
        ctx.beginPath();
        ctx.arc(sx * r * 0.65 * flap, -r * 0.45, r * 0.045, 0, Math.PI * 2);
        ctx.fill();
    }
    // Body — slim oval
    ctx.fillStyle = '#3b2a1c';
    ctx.beginPath();
    ctx.ellipse(0, 0, r * 0.08, r * 0.55, 0, 0, Math.PI * 2);
    ctx.fill();
    // Head dot
    ctx.fillStyle = '#3b2a1c';
    ctx.beginPath();
    ctx.arc(0, -r * 0.55, r * 0.10, 0, Math.PI * 2);
    ctx.fill();
    // Antennae — curling
    ctx.strokeStyle = '#3b2a1c';
    ctx.lineWidth = Math.max(1.5, r * 0.025);
    ctx.lineCap = 'round';
    for (const sx of [-1, 1]) {
        ctx.beginPath();
        ctx.moveTo(sx * r * 0.04, -r * 0.62);
        ctx.bezierCurveTo(
            sx * r * 0.18, -r * 0.85,
            sx * r * 0.30, -r * 0.95,
            sx * r * 0.32, -r * 1.10
        );
        ctx.stroke();
        // antenna tip
        ctx.fillStyle = '#3b2a1c';
        ctx.beginPath();
        ctx.arc(sx * r * 0.32, -r * 1.10, r * 0.05, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.restore();
}

/* ──────────────────────  STAGE 5: 20-Second Rest  ────────────────────── */
let orientationGranted = false;
let orientationData = { tilted: false, alpha: 0, beta: 0, gamma: 0, available: false };
function handleOrient(e) {
    orientationData.alpha = e.alpha || 0;
    orientationData.beta = e.beta || 0;     // x-axis rotation (forward/backward)
    orientationData.gamma = e.gamma || 0;   // y-axis rotation (left/right)
    orientationData.available = true;
    // Phone is "looked away" if it's tilted significantly: gamma >35° or beta >70° or beta<10°
    const tilted = Math.abs(orientationData.gamma) > 35
        || orientationData.beta > 70
        || orientationData.beta < 15;
    orientationData.tilted = tilted;
}
function requestOrientationOnce() {
    if (typeof DeviceOrientationEvent === 'undefined') return;
    if (typeof DeviceOrientationEvent.requestPermission === 'function') {
        DeviceOrientationEvent.requestPermission().then(state => {
            if (state === 'granted') {
                window.addEventListener('deviceorientation', handleOrient);
                orientationGranted = true;
            }
        }).catch(() => {});
    } else {
        window.addEventListener('deviceorientation', handleOrient);
        orientationGranted = true;
    }
}
function stageRest(ts, dt, elapsed) {
    if (!stageData.init) {
        stageData.init = true;
        stageData.holdSec = 0;
        stageData.target = 20;
        stageData.lastTs = ts;
        if (!orientationGranted) requestOrientationOnce();
        showInstr('i5_pre');
    }
    // Pre-prompt period — absolute first 2.5 s of the stage
    if (elapsed < 2.5) {
        // Big text of i5_pre via instr
        // Add a clock icon
        drawClock(W / 2, H / 2, Math.min(W, H) * 0.22, ts);
        return;
    }
    if (!stageData.startedTimer) {
        stageData.startedTimer = true;
        showInstr('i5_main');
        $countdown.classList.remove('hidden');
        stageData.timerStart = ts;
        stageData.tickedAt = 0;
        tick();
    }

    // Determine if user is "looking away":
    // If orientation API is available, require tilt.
    // Otherwise, fall back to "trust the kid" — count down anyway.
    const dts = (ts - stageData.lastTs) / 1000;
    stageData.lastTs = ts;
    const usingOrient = orientationData.available;
    const counts = !usingOrient || orientationData.tilted;
    if (counts) {
        stageData.holdSec += dts;
    }
    // tick every full second
    const wholeSec = Math.floor(stageData.holdSec);
    const remaining = Math.max(0, stageData.target - wholeSec);
    if (wholeSec !== stageData.tickedAt) {
        stageData.tickedAt = wholeSec;
        if (counts) tick();
    }
    $countdown.textContent = remaining;

    // Show tilt hint if orientation available but not tilted
    if (usingOrient && !orientationData.tilted) {
        showInstr('i5_tilt');
    } else {
        showInstr(remaining > 0 ? 'i5_main' : 'i5_done');
    }

    // Draw a window/wall icon
    drawWindow(W / 2, H * 0.35, Math.min(W, H) * 0.18, !!counts);

    if (stageData.holdSec >= stageData.target) {
        // done!
        $countdown.classList.add('hidden');
        flash();
        chord();
        showInstr('i5_done');
        // Force-advance soon
        setTimeout(() => {
            if (stageRunning) {
                // Bump elapsed past dur
                stageStart = performance.now() - stages[4].dur * 1000 - 100;
            }
        }, 700);
    }
}
function drawClock(cx, cy, r, ts) {
    ctx.strokeStyle = 'rgba(245,233,200,0.6)';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.stroke();
    // ticks
    for (let i = 0; i < 12; i++) {
        const a = (Math.PI * 2 / 12) * i - Math.PI / 2;
        const x1 = cx + Math.cos(a) * r * 0.85;
        const y1 = cy + Math.sin(a) * r * 0.85;
        const x2 = cx + Math.cos(a) * r * 0.95;
        const y2 = cy + Math.sin(a) * r * 0.95;
        ctx.beginPath();
        ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
    }
    // hand sweeping
    const sweep = (ts / 1000) % 60 / 60 * Math.PI * 2 - Math.PI / 2;
    ctx.strokeStyle = '#f0c050';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.cos(sweep) * r * 0.7, cy + Math.sin(sweep) * r * 0.7);
    ctx.stroke();
    ctx.fillStyle = '#f0c050';
    ctx.beginPath();
    ctx.arc(cx, cy, 5, 0, Math.PI * 2);
    ctx.fill();
}
function drawWindow(cx, cy, r, active) {
    ctx.strokeStyle = active ? '#f0c050' : 'rgba(245,233,200,0.4)';
    ctx.fillStyle   = active ? 'rgba(240,192,80,0.16)' : 'rgba(245,233,200,0.06)';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.rect(cx - r, cy - r, r * 2, r * 2);
    ctx.fill(); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx, cy - r); ctx.lineTo(cx, cy + r);
    ctx.moveTo(cx - r, cy); ctx.lineTo(cx + r, cy);
    ctx.stroke();
    // sun rays icon if active
    if (active) {
        ctx.strokeStyle = '#f0c050';
        ctx.lineWidth = 3;
        const sx = cx + r * 0.45, sy = cy - r * 0.4;
        ctx.beginPath();
        ctx.arc(sx, sy, r * 0.18, 0, Math.PI * 2);
        ctx.stroke();
        for (let i = 0; i < 8; i++) {
            const a = (Math.PI * 2 / 8) * i;
            const x1 = sx + Math.cos(a) * r * 0.26;
            const y1 = sy + Math.sin(a) * r * 0.26;
            const x2 = sx + Math.cos(a) * r * 0.4;
            const y2 = sy + Math.sin(a) * r * 0.4;
            ctx.beginPath();
            ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
        }
    }
}

/* ──────────────────────  STAGE 6: Dawn  ────────────────────── */
function stageDawn(ts, dt, elapsed) {
    // sun rises
    const cx = W / 2;
    const t01 = Math.min(1, elapsed / 5);
    const cy = H * 0.95 - H * 0.45 * t01;
    const r = Math.min(W, H) * 0.22;
    // glow
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r * 2.5);
    grad.addColorStop(0, 'rgba(255,220,140,0.95)');
    grad.addColorStop(0.4, 'rgba(255,180,100,0.55)');
    grad.addColorStop(1, 'rgba(255,180,100,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
    // sun disc
    ctx.fillStyle = '#fff0b0';
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fill();
    // sun rays
    ctx.strokeStyle = 'rgba(255,220,140,0.9)';
    ctx.lineWidth = 4;
    for (let i = 0; i < 12; i++) {
        const a = (Math.PI * 2 / 12) * i + ts / 4000;
        const x1 = cx + Math.cos(a) * r * 1.15;
        const y1 = cy + Math.sin(a) * r * 1.15;
        const x2 = cx + Math.cos(a) * r * 1.4;
        const y2 = cy + Math.sin(a) * r * 1.4;
        ctx.beginPath();
        ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
    }
}

/* Initial render */
applyI18n();
ctx.clearRect(0, 0, W, H);
drawStars(0);

// Idle owl peeks on intro screen for delight
function idleLoop(ts) {
    if (stageRunning) return; // gameLoop owns the canvas during play
    ctx.clearRect(0, 0, W, H);
    drawStars(ts);
    requestAnimationFrame(idleLoop);
}
requestAnimationFrame(idleLoop);

/* Visibility pause */
document.addEventListener('visibilitychange', () => {
    if (document.hidden && stageRunning) {
        // pause gameplay timer by adjusting stageStart
        stageData._pauseAt = performance.now();
    } else if (!document.hidden && stageData && stageData._pauseAt) {
        const dur = performance.now() - stageData._pauseAt;
        stageStart += dur;
        stageData._pauseAt = 0;
    }
});

/* Prevent iOS double-tap zoom on UI */
let lastTouch = 0;
document.addEventListener('touchend', e => {
    const now = Date.now();
    if (now - lastTouch < 300) e.preventDefault();
    lastTouch = now;
}, { passive: false });

/* GIF capture harness — only active when URL hash starts with #frame= .
   Lets the offline capture script jump deterministically to specific
   moments without affecting normal users. */
(function frameHarness() {
    const h = location.hash || '';
    if (!h.startsWith('#frame=')) return;
    const params = {};
    h.slice(1).split('&').forEach(kv => {
        const [k, v] = kv.split('=');
        params[k] = v;
    });
    const which = params.frame;
    if (which === 'intro') {
        return; // already on intro
    }
    if (which === 'end') {
        // Skip to end screen
        setTimeout(() => {
            stageIdx = stages.length;
            endGame();
        }, 50);
        return;
    }
    if (which === 'stage') {
        const i = parseInt(params.i || '0', 10);
        const tms = parseInt(params.t || '0', 10);
        // Boot stage i with a virtual elapsed of tms
        setTimeout(() => {
            audio();
            $sceneIntro.classList.add('hidden');
            $sceneEnd.classList.add('hidden');
            stageIdx = i - 1;
            nextStage();
            // Backdate stageStart so elapsed = tms/1000
            stageStart = performance.now() - tms;
        }, 60);
    }
})();

</script>
</body>
</html>
